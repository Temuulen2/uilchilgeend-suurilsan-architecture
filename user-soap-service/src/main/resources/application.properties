spring.application.name=user-soap-service

# ?? Database ?? values injected via environment variables ??????????????????
# LOCAL default (no SSL):
#   spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#
# DigitalOcean Managed MySQL (SSL required) ? set these env vars on Droplet:
#   DB_URL      = jdbc:mysql://db-mysql-nyc3-39242-do-user-36992248-0.h.db.ondigitalocean.com:25060/auth_db?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
#   DB_USERNAME = doadmin
#   DB_PASSWORD = <your-db-password-from-do-dashboard>
spring.datasource.url=${DB_URL:jdbc:mysql://db-mysql-nyc3-39242-do-user-36992248-0.h.db.ondigitalocean.com:25060/auth_db?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC&autoReconnect=true}
spring.datasource.username=${DB_USERNAME:doadmin}
spring.datasource.password=${DB_PASSWORD:}

# Prevent app crash when DB is temporarily unreachable at startup
spring.datasource.hikari.initializationFailTimeout=-1

# Hibernate auto creates tables if they don't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Log DB connection attempts
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.jdbc=DEBUG

server.port=${PORT:8080}